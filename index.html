<!doctype html>
<!--
  index.html — control-tower root layout (SADD §2.1).
  Three-pane shell: LEFT = step/task tree with enable toggles; CENTER = the
  schema-driven form + resolved-command preview + plan panel + log; RIGHT =
  the single-<video> previewer + docked help. Top bar = theme / cap / Run / Cancel.
  All behaviour is wired in src/main.ts; this file is pure structure.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video-Pipeline Control Tower</title>
  </head>
  <body>
    <div id="app">
      <!-- ================= TOP BAR ================= -->
      <header id="topbar">
        <div class="topbar__left">
          <span class="topbar__title">Control Tower</span>
          <span id="engine-name" class="topbar__engine">—</span>
        </div>
        <div class="topbar__right">
          <div class="topbar__group">
            <button id="run-btn" type="button" class="btn btn--run">▶ Run</button>
            <button id="cancel-btn" type="button" class="btn btn--cancel">■ Cancel</button>
          </div>
          <div class="topbar__group">
            <label class="topbar__cap" title="Maximum tasks run at once within a level">
              <span id="cap-help">Parallel</span>
              <select id="cap-input">
                <option value="1">1 task</option>
                <option value="2" selected>2 tasks</option>
                <option value="3">3 tasks</option>
                <option value="4">4 tasks</option>
              </select>
            </label>
            <span id="run-progress" class="topbar__progress"></span>
          </div>
          <div class="topbar__group topbar__group--app">
            <button id="pipeline-btn" type="button" class="btn btn--ghost"
                    title="Set the video-pipeline executable to run (so the app finds it regardless of how it was launched)">Pipeline…</button>
            <button id="reset-btn" type="button" class="btn btn--ghost"
                    title="Reset all fields, panels, and theme to UI defaults">Reset UI</button>
            <button id="theme-toggle" type="button" class="btn btn--ghost btn--icon"
                    title="Toggle light / dark" aria-label="Toggle theme"></button>
          </div>
        </div>
      </header>

      <!-- ============ WARNING BANNER (shown only on invalid selection) ====== -->
      <div id="banner" class="banner" role="alert" hidden></div>

      <!-- ================= MAIN GRID ================= -->
      <main id="grid">
        <!-- LEFT: step/task tree (content-width, always shown). The Output/
             Packaging step + its export tasks render here like any other step. -->
        <aside id="left" class="pane">
          <div id="step-tree" class="pane__scroll"></div>
        </aside>

        <!-- CENTER: form + resolved command (docked) + run output -->
        <section id="center" class="pane">
          <div id="form-host" class="center__form pane__scroll"></div>

          <!-- Resolved command docks at the bottom of the config area; the
               horizontal splitter sits BELOW it so collapsing the run output
               never hides the command. -->
          <div id="cmd-bar" class="center__cmd"></div>

          <div id="log-split" class="hsplit" title="Drag to resize · drag down to collapse"></div>

          <section id="log-panel" class="center__log">
            <div class="pane__title pane__title--inline">
              <span>Run output</span>
              <button id="log-collapse" class="pane__collapse" type="button"
                      title="Collapse / expand" aria-label="Collapse run output">▾</button>
            </div>
            <div id="log-view"></div>
          </section>
        </section>

        <!-- vertical splitter between center and the preview/help panel -->
        <div id="right-split" class="vsplit" title="Drag to resize · drag right to collapse"></div>

        <!-- RIGHT: previewer (fills) + resize handle + collapsible help -->
        <aside id="right" class="pane">
          <div class="pane__title">Preview</div>
          <div id="previewer"></div>
          <div id="right-help-split" class="hsplit" title="Drag to resize · drag down to collapse help"></div>
          <div class="pane__title pane__title--help pane__title--inline">
            <span>Help</span>
            <button id="help-collapse" class="pane__collapse" type="button"
                    title="Collapse / expand" aria-label="Collapse help">▾</button>
          </div>
          <div id="help" class="right__help pane__scroll">
            <div id="help-body" class="help">
              <p class="help__placeholder">Focus a control to see what it does and the CLI flag it maps to.</p>
            </div>
          </div>
        </aside>
      </main>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
